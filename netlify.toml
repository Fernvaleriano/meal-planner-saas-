[build]
  publish = "."
  command = "npm install && npm run build"

# Old domain → new domain. Existing clients on PWA homescreen icons land on
# ziquefitnessnutrition.com and need to be sent to ziquecoach.com so the
# sender/link domain matches and the site URL stays consistent.
[[redirects]]
  from = "https://ziquefitnessnutrition.com/*"
  to = "https://ziquecoach.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.ziquefitnessnutrition.com/*"
  to = "https://ziquecoach.com/:splat"
  status = 301
  force = true

# Branded client login addresses: ziquecoach.com/gym/<slug> resolves the
# coach by their auto-generated brand_slug and redirects to the branded
# login page (coach's logo + colors + home-screen identity).
[[redirects]]
  from = "/gym/*"
  to = "/.netlify/functions/gym-login?slug=:splat"
  status = 200
  force = true

# Branded STAFF (coach + trainer) login: ziquecoach.com/staff/<slug>, or bare
# /staff on a gym's own white-label domain. Mirrors /gym/* but resolves to the
# staff login (login.html) skinned with the gym's brand instead of the member
# login. Bare /staff (no slug) lets the function read the gym from the hostname.
[[redirects]]
  from = "/staff/*"
  to = "/.netlify/functions/staff-login?slug=:splat"
  status = 200
  force = true

[[redirects]]
  from = "/staff"
  to = "/.netlify/functions/staff-login"
  status = 200
  force = true

# Clean signup link for white-label gym domains: <gymdomain>/join serves the
# member signup page. On a gym's own domain the page fills the gym's join code
# from its hostname, so the printed/QR link stays tidy (no ?code= tail).
# Served through a function so shared-link previews carry the gym's OWN logo
# (social apps read the raw HTML and never run the page's branding JS).
[[redirects]]
  from = "/join"
  to = "/.netlify/functions/gym-join-page"
  status = 200

# Clean link a gym uses to drop their raw exercise clips into a private inbox.
# The gym id (?g=) still rides along; this just gives a tidy /gym-upload path.
[[redirects]]
  from = "/gym-upload"
  to = "/gym-upload.html"
  status = 200

# SPA routing - /app is the primary client portal
[[redirects]]
  from = "/app"
  to = "/app-test-dist/app-test.html"
  status = 200
  force = true

[[redirects]]
  from = "/app/*"
  to = "/app-test-dist/app-test.html"
  status = 200
  force = true

# Legacy /app-test routes (keep for backwards compatibility)
[[redirects]]
  from = "/app-test"
  to = "/app"
  status = 301

[[redirects]]
  from = "/app-test/*"
  to = "/app/:splat"
  status = 301

# Redirect old PWA start_url to new SPA
[[redirects]]
  from = "/portal.html"
  to = "/app"
  status = 301
  force = true

# Redirect old PWA URLs to new SPA at /app
[[redirects]]
  from = "/client-login.html"
  to = "/app"
  status = 301
  force = true

[[redirects]]
  from = "/client-dashboard.html"
  to = "/app"
  status = 301
  force = true

[[redirects]]
  from = "/client-diary.html"
  to = "/app/diary"
  status = 301
  force = true

[[redirects]]
  from = "/client-plans.html"
  to = "/app/plans"
  status = 301
  force = true

[[redirects]]
  from = "/client-progress.html"
  to = "/app/progress"
  status = 301
  force = true

[[redirects]]
  from = "/client-settings.html"
  to = "/app/settings"
  status = 301
  force = true

[[redirects]]
  from = "/client-favorites.html"
  to = "/app"
  status = 301
  force = true

[[redirects]]
  from = "/client-recipes.html"
  to = "/app/recipes"
  status = 301
  force = true

[[redirects]]
  from = "/client-checkin.html"
  to = "/app/check-in"
  status = 301
  force = true

[[redirects]]
  from = "/client-workouts.html"
  to = "/app/workouts"
  status = 301
  force = true

[[redirects]]
  from = "/client-forgot-password.html"
  to = "/app"
  status = 301
  force = true

[[redirects]]
  from = "/client-reset-password.html"
  to = "/app"
  status = 301
  force = true

[build.environment]
  NODE_VERSION = "18"

# Asset optimization - minify and compress
[build.processing]
  skip_processing = false
[build.processing.css]
  bundle = true
  minify = true
[build.processing.js]
  bundle = true
  minify = true
[build.processing.html]
  pretty_urls = false
[build.processing.images]
  compress = true

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Scheduled function - runs every hour to send check-in reminders
[functions."send-checkin-reminders"]
  schedule = "@hourly"

# Scheduled function - runs daily at 8 AM UTC to check for ending workout programs
[functions."send-workout-end-notifications"]
  schedule = "0 8 * * *"

# Scheduled function - runs daily at 12 PM UTC (US morning): emails each coach
# a triage digest of slipping/winning clients. Skips coaches with nothing to report.
[functions."send-daily-coach-digest"]
  schedule = "0 12 * * *"

# Scheduled function - runs daily at 4 AM UTC. Permanently purges accounts
# whose 30-day deletion grace has passed. DRY-RUN unless env PURGE_LIVE=true.
[functions."purge-deleted-accounts"]
  schedule = "0 4 * * *"

# Demo client seeder generates 10 photorealistic images via Replicate Flux 1.1
# Pro Ultra (~10-15s each, run in parallel ~15-25s total) plus uploads — bump
# its timeout above the default so the call doesn't get cut off.
[functions."seed-demo-client"]
  timeout = 60

# Workout cover generator runs full Imagen-4 + a Claude vision QA check, and
# regenerates up to 3x until the image passes (text-free / no-people / on-brief).
# Worst case is ~3 image gens + 3 vision calls, so bump above the default.
[functions."workout-cover-image"]
  timeout = 120

# AI workout generator (Claude). A single-workout generation plus exercise
# matching can run past the 10s default, so give it headroom to avoid the call
# being cut off. Used by the coach builder and the member-facing generator.
[functions."generate-workout-claude"]
  timeout = 26

# AI meal generator (Claude/Gemini). Full-plan generation and the structured
# meal-prep guide can run past the 10s default, so give it headroom to avoid
# the call being cut off mid-generation. Used by the client meal planner.
[functions."generate-meal-plan"]
  timeout = 26

# HTTP Caching Headers for optimal performance
#
# NOTE: when several header rules match the same path, Netlify does NOT let a
# later rule override an earlier one — it sends BOTH values, and browsers then
# honor the first/strongest Cache-Control they see. A blanket /*.js immutable
# rule here used to merge with the /js/* revalidate rule below, so browsers
# kept old /js scripts (coach-layout.js) for a year and code fixes never
# reached returning users. Immutable is therefore scoped to the only genuinely
# immutable scripts — the content-hashed Vite build output — and must never
# be widened back to /*.js.
[[headers]]
  for = "/app-test-dist/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# First-party app scripts under /js/ change over time (coach-layout.js, etc.).
# Revalidate these on every load so updates propagate (cheap 304s via ETag).
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# First-party stylesheets under /css/ are referenced WITHOUT version params,
# so they must revalidate like /js/* — a blanket /*.css immutable rule pinned
# them in browsers for a year (same failure that hid coach-layout.js fixes).
# The content-hashed SPA css is covered by the /app-test-dist/assets/* rule.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML must revalidate on every load (cheap ETag 304s). With max-age=3600,
# browsers kept serving hour-old page HTML that referenced old versioned
# script URLs, so deployed fixes reached some pages but not others.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: ; media-src 'self' blob: https://*.supabase.co https://*.supabase.in; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co https://cdn.jsdelivr.net https://api.stripe.com https://*.netlify.app https://*.netlify.com https://*.ingest.us.sentry.io; frame-src 'self' https://js.stripe.com https://hooks.stripe.com; worker-src 'self' blob:;"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

