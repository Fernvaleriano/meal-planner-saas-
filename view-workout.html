<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #0d9488;
            --brand-secondary: #0284c7;
            --brand-gradient: linear-gradient(135deg, #0d9488 0%, #0284c7 100%);
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #334155;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 120px;
        }

        .top-bar {
            background: var(--brand-gradient);
            padding: 24px 20px;
            text-align: center;
        }

        .top-bar-logo {
            max-height: 40px;
            margin-bottom: 8px;
        }

        .top-bar-coach {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.85);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .top-bar-title {
            font-size: 1.05rem;
            color: white;
            font-weight: 700;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 20px;
        }

        .program-header {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
        }

        .program-name {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .program-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .meta-pill {
            background: var(--bg-tertiary);
            padding: 4px 10px;
            border-radius: 999px;
            text-transform: capitalize;
        }

        .program-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .expiry-banner {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: var(--warning);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .day-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            overflow: hidden;
        }

        .day-header {
            padding: 16px 20px;
            background: var(--bg-tertiary);
            font-weight: 700;
            font-size: 1.05rem;
            border-bottom: 1px solid var(--border-color);
        }

        .day-body { padding: 8px; }

        .section-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            padding: 14px 12px 6px;
        }

        .exercise-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 14px;
            margin: 8px;
            display: flex;
            gap: 14px;
        }

        .exercise-thumb {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-sm);
            background: var(--bg-tertiary);
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .exercise-thumb img,
        .exercise-thumb video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .exercise-thumb .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.35);
            color: white;
        }

        .exercise-info { flex: 1; min-width: 0; }

        .exercise-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .exercise-muscle {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .sets-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 6px;
        }

        .set-row {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .set-num {
            color: var(--text-muted);
            width: 48px;
            font-weight: 600;
        }

        .exercise-notes {
            margin-top: 8px;
            padding: 8px 10px;
            background: rgba(13, 148, 136, 0.08);
            border-left: 2px solid var(--brand-primary);
            border-radius: 4px;
            font-size: 0.78rem;
            color: var(--text-secondary);
            font-style: italic;
            line-height: 1.4;
        }

        .voice-note {
            margin-top: 8px;
            padding: 8px 10px;
            background: rgba(2, 132, 199, 0.08);
            border-left: 2px solid var(--brand-secondary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .voice-note-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--brand-secondary);
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .voice-note audio {
            flex: 1;
            min-width: 0;
            height: 32px;
        }

        .ref-links {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ref-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.8rem;
            transition: border-color 0.15s, background 0.15s;
        }

        .ref-link:hover {
            border-color: var(--brand-primary);
            background: rgba(13, 148, 136, 0.08);
        }

        .ref-link-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: white;
        }

        .ref-link-icon.youtube { background: #ff0000; }
        .ref-link-icon.instagram { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }
        .ref-link-icon.generic { background: var(--bg-primary); color: var(--text-secondary); }

        .ref-link-title {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
        }

        .ref-link-arrow {
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .video-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .video-modal.active { display: flex; }

        .video-modal video {
            max-width: 100%;
            max-height: 80vh;
            border-radius: var(--radius-md);
        }

        .video-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cta-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--brand-gradient);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            z-index: 50;
        }

        .cta-text {
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .cta-text small {
            display: block;
            font-size: 0.72rem;
            font-weight: 400;
            opacity: 0.9;
            margin-top: 2px;
        }

        .cta-btn {
            background: white;
            color: var(--brand-primary);
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
        }

        .cta-btn:hover { opacity: 0.95; }

        .empty-state, .error-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon, .error-state .icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .error-state h2 { color: var(--text-primary); margin-bottom: 8px; }

        @media (max-width: 600px) {
            .program-name { font-size: 1.25rem; }
            .exercise-thumb { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <img id="brandLogo" class="top-bar-logo" alt="" style="display:none;">
        <div class="top-bar-coach" id="coachName"></div>
        <div class="top-bar-title">Workout Preview</div>
    </div>

    <div class="container" id="container">
        <div class="empty-state">
            <div class="icon">⏳</div>
            <p>Loading workout...</p>
        </div>
    </div>

    <div class="video-modal" id="videoModal" onclick="if(event.target.id==='videoModal')closeVideo()">
        <button class="video-modal-close" onclick="closeVideo()">×</button>
        <video id="videoPlayer" controls playsinline></video>
    </div>

    <a class="cta-banner" id="ctaBanner" href="#" target="_blank" rel="noopener noreferrer" style="display:none;">
        <div class="cta-text">
            <span id="ctaTitle">Like this workout?</span>
            <small id="ctaSubtitle">Sign up to train with me.</small>
        </div>
        <span class="cta-btn" id="ctaButton">Get Started →</span>
    </a>

    <script>
        const params = new URLSearchParams(window.location.search);
        const shareId = params.get('share');
        const container = document.getElementById('container');

        function fmtRest(seconds) {
            const s = Number(seconds) || 0;
            if (s <= 0) return '';
            if (s < 60) return `${s}s rest`;
            const m = Math.floor(s / 60);
            const r = s % 60;
            return r ? `${m}m ${r}s rest` : `${m}m rest`;
        }

        function fmtDuration(seconds) {
            const s = Number(seconds) || 0;
            if (s < 60) return `${s}s`;
            const m = Math.floor(s / 60);
            const r = s % 60;
            return r ? `${m}m ${r}s` : `${m}m`;
        }

        function escapeHtml(str) {
            return String(str || '').replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }

        function renderSets(ex) {
            const setsData = Array.isArray(ex.setsData) ? ex.setsData : [];
            if (!setsData.length) {
                if (ex.trackingType === 'time' && ex.duration) {
                    return `<div class="set-row"><span class="set-num">Time</span><span>${fmtDuration(ex.duration)}</span></div>`;
                }
                return '';
            }
            return setsData.map((s, i) => {
                const parts = [];
                if (ex.trackingType === 'time' || s.duration) {
                    parts.push(fmtDuration(s.duration));
                } else {
                    if (s.reps !== undefined && s.reps !== null && s.reps !== '') parts.push(`${s.reps} reps`);
                    if (s.weight) parts.push(`${s.weight} ${s.weightUnit || 'lbs'}`);
                }
                const rest = fmtRest(s.restSeconds);
                if (rest) parts.push(rest);
                return `<div class="set-row"><span class="set-num">Set ${i + 1}</span><span>${escapeHtml(parts.join(' · '))}</span></div>`;
            }).join('');
        }

        function renderExercise(ex) {
            // Prefer the coach's custom upload over the default exercise-library video
            const media = ex.customVideoUrl || ex.video_url || ex.animation_url || '';
            const thumb = ex.thumbnail_url || '';
            const hasMedia = !!media;
            const thumbHtml = thumb
                ? `<img src="${escapeHtml(thumb)}" alt="" onerror="this.style.display='none'">`
                : (hasMedia ? `<video src="${escapeHtml(media)}" muted playsinline preload="metadata"></video>` : '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);">💪</div>');
            const playOverlay = hasMedia ? `<div class="play-overlay"><svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>` : '';
            const muscle = ex.muscle_group ? `<div class="exercise-muscle">${escapeHtml(ex.muscle_group)}${ex.equipment ? ' · ' + escapeHtml(ex.equipment) : ''}</div>` : '';
            const notes = ex.notes ? `<div class="exercise-notes">${escapeHtml(ex.notes)}</div>` : '';
            // Prefer the serve-voice-note proxy so audio always 302s to a
            // fresh signed URL (avoids URL-expiry breakage on long-lived shares)
            const voiceNoteSrc = ex.voiceNotePath
                ? `/.netlify/functions/serve-voice-note?path=${encodeURIComponent(ex.voiceNotePath)}`
                : (ex.voiceNoteUrl || '');
            const voiceNote = voiceNoteSrc
                ? `<div class="voice-note"><span class="voice-note-label">🎙️ Coach</span><audio controls playsinline preload="auto" src="${escapeHtml(voiceNoteSrc)}" onerror="handleVoiceNoteError(this, '${escapeHtml(voiceNoteSrc)}')"></audio></div>`
                : '';

            const refIcons = {
                youtube: `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`,
                instagram: `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>`,
                generic: `<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>`
            };
            const links = Array.isArray(ex.reference_links) ? ex.reference_links.filter(l => l && l.url) : [];
            const refLinksHtml = links.length
                ? `<div class="ref-links">${links.map(l => {
                        const t = (l.type === 'youtube' || l.type === 'instagram') ? l.type : 'generic';
                        const title = l.title || (function(){ try { return new URL(l.url).hostname.replace('www.', ''); } catch(_e) { return l.url; } })();
                        return `<a class="ref-link" href="${escapeHtml(l.url)}" target="_blank" rel="noopener noreferrer">
                            <span class="ref-link-icon ${t}">${refIcons[t]}</span>
                            <span class="ref-link-title">${escapeHtml(title)}</span>
                            <svg class="ref-link-arrow" width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                        </a>`;
                    }).join('')}</div>`
                : '';

            return `
                <div class="exercise-card">
                    <div class="exercise-thumb" ${hasMedia ? `onclick="playVideo('${escapeHtml(media)}')"` : ''}>
                        ${thumbHtml}
                        ${playOverlay}
                    </div>
                    <div class="exercise-info">
                        <div class="exercise-name">${escapeHtml(ex.name || 'Exercise')}</div>
                        ${muscle}
                        <div class="sets-list">${renderSets(ex)}</div>
                        ${notes}
                        ${voiceNote}
                        ${refLinksHtml}
                    </div>
                </div>
            `;
        }

        function renderDay(day) {
            const exercises = Array.isArray(day.exercises) ? day.exercises : [];
            const grouped = { 'warm-up': [], main: [], 'cool-down': [] };
            exercises.forEach(ex => {
                const sec = ex.section === 'warm-up' || ex.section === 'cool-down' ? ex.section : 'main';
                grouped[sec].push(ex);
            });
            const labels = { 'warm-up': 'Warm-Up', main: 'Main Workout', 'cool-down': 'Cool-Down' };
            const sectionsHtml = ['warm-up', 'main', 'cool-down']
                .filter(k => grouped[k].length)
                .map(k => `
                    <div class="section-label">${labels[k]}</div>
                    ${grouped[k].map(renderExercise).join('')}
                `).join('');

            return `
                <div class="day-card">
                    <div class="day-header">${escapeHtml(day.name || 'Day')}</div>
                    <div class="day-body">${sectionsHtml || '<div style="padding:20px;color:var(--text-muted);text-align:center;">No exercises</div>'}</div>
                </div>
            `;
        }

        function playVideo(url) {
            if (!url) return;
            const player = document.getElementById('videoPlayer');
            player.src = url;
            document.getElementById('videoModal').classList.add('active');
            player.play().catch(() => {});
        }

        // iOS Safari can't decode webm/opus voice notes. When the audio
        // element errors, swap it for a download link so the recipient
        // can still hear the coach's note off-device.
        function handleVoiceNoteError(audioEl, src) {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const reason = isIOS
                ? "iPhone can't play this voice note format. Tap to download."
                : "Couldn't play this voice note.";
            audioEl.outerHTML = `<span style="color:var(--warning); font-size:0.78rem;">⚠ ${reason}</span> <a href="${src}" download style="color:var(--brand-secondary); font-size:0.78rem; font-weight:600; text-decoration:underline; margin-left:6px;">Download</a>`;
        }

        // iOS allows only one active media session at a time. Globally pause
        // every other audio when one starts so the new tap always wins.
        document.addEventListener('play', (e) => {
            const target = e.target;
            if (!(target instanceof HTMLAudioElement)) return;
            document.querySelectorAll('audio').forEach(a => {
                if (a !== target && !a.paused) a.pause();
            });
        }, true);

        function closeVideo() {
            const player = document.getElementById('videoPlayer');
            player.pause();
            player.src = '';
            document.getElementById('videoModal').classList.remove('active');
        }

        function renderError(title, message) {
            container.innerHTML = `
                <div class="error-state">
                    <div class="icon">🔒</div>
                    <h2>${escapeHtml(title)}</h2>
                    <p>${escapeHtml(message)}</p>
                </div>
            `;
        }

        function renderProgram(payload) {
            const p = payload.programData || {};
            const days = Array.isArray(p.days) ? p.days : (p.program_data && Array.isArray(p.program_data.days) ? p.program_data.days : []);

            // Top-bar coach branding
            const branding = payload.coachBranding;
            if (branding) {
                if (branding.logoUrl) {
                    const img = document.getElementById('brandLogo');
                    img.src = branding.logoUrl;
                    img.style.display = 'inline-block';
                }
                if (branding.displayName) {
                    document.getElementById('coachName').textContent = branding.displayName;
                    document.getElementById('ctaTitle').textContent = `Like this workout? Train with ${branding.displayName}.`;
                }
            }

            // Expiry banner
            let expiryHtml = '';
            if (payload.expiresAt) {
                const exp = new Date(payload.expiresAt);
                const msLeft = exp.getTime() - Date.now();
                const daysLeft = Math.ceil(msLeft / (1000 * 60 * 60 * 24));
                const label = daysLeft <= 1 ? 'less than a day' : `${daysLeft} days`;
                expiryHtml = `<div class="expiry-banner">This preview link expires in ${label}.</div>`;
            }

            const meta = [
                p.program_type,
                p.difficulty,
                p.days_per_week ? `${p.days_per_week} days/week` : null,
                p.duration_weeks ? `${p.duration_weeks} weeks` : null
            ].filter(Boolean).map(m => `<span class="meta-pill">${escapeHtml(m)}</span>`).join('');

            const headerHtml = `
                <div class="program-header">
                    <div class="program-name">${escapeHtml(p.name || 'Workout')}</div>
                    ${meta ? `<div class="program-meta">${meta}</div>` : ''}
                    ${p.description ? `<div class="program-desc">${escapeHtml(p.description)}</div>` : ''}
                </div>
            `;

            const daysHtml = days.length
                ? days.map(renderDay).join('')
                : '<div class="empty-state"><div class="icon">📋</div><p>This workout has no days yet.</p></div>';

            container.innerHTML = expiryHtml + headerHtml + daysHtml;

            // Show CTA — coach-customized link if provided, otherwise hide it
            const cta = document.getElementById('ctaBanner');
            const ctaButton = document.getElementById('ctaButton');
            if (payload.ctaUrl) {
                cta.href = payload.ctaUrl;
                if (payload.ctaLabel) ctaButton.textContent = payload.ctaLabel;
                cta.style.display = 'flex';
            } else {
                cta.style.display = 'none';
            }
        }

        async function loadWorkout() {
            if (!shareId) {
                renderError('Missing link', 'No share ID was provided.');
                return;
            }
            try {
                const res = await fetch(`/.netlify/functions/get-shared-workout?shareId=${encodeURIComponent(shareId)}`);
                if (res.status === 410) {
                    renderError('Link expired', 'This workout preview link has expired. Reach out to your coach for a new one.');
                    return;
                }
                if (!res.ok) {
                    renderError('Workout not found', 'This link is invalid or has been removed.');
                    return;
                }
                const data = await res.json();
                renderProgram(data);
            } catch (err) {
                renderError('Couldn’t load workout', 'Something went wrong. Please try again.');
            }
        }

        loadWorkout();
    </script>
</body>
</html>
