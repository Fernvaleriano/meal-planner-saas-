    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        .page-container { padding: 32px; max-width: 900px; }
        .page-title { font-size: 24px; font-weight: 700; color: var(--gray-800, #1e293b); margin-bottom: 24px; }

        /* Loading */
        .loading-container { display: flex; justify-content: center; align-items: center; height: 300px; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--gray-200, #e2e8f0); border-top-color: var(--brand-primary, #0d9488); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Cards */
        .billing-card { background: white; border-radius: 12px; border: 1px solid var(--gray-200, #e2e8f0); padding: 24px; margin-bottom: 20px; }
        .billing-card.warning { border-color: #f59e0b; }

        /* Connect Section */
        .connect-status { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .status-dot.active { background: #22c55e; }
        .status-dot.pending { background: #f59e0b; }
        .connect-title { font-size: 18px; font-weight: 600; color: var(--gray-800, #1e293b); margin-bottom: 8px; }
        .connect-desc { color: var(--gray-500, #64748b); font-size: 14px; margin-bottom: 16px; }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background: var(--brand-primary, #0d9488); color: white; }
        .btn-primary:hover:not(:disabled) { opacity: 0.9; }
        .btn-secondary { background: var(--gray-100, #f1f5f9); color: var(--gray-700, #334155); }
        .btn-secondary:hover:not(:disabled) { background: var(--gray-200, #e2e8f0); }
        .btn-danger { background: transparent; color: #ef4444; border: 1px solid #fecaca; }
        .btn-danger:hover:not(:disabled) { background: #fef2f2; }
        .btn-small { padding: 6px 12px; font-size: 13px; }
        .btn-link { background: none; border: none; color: var(--brand-primary, #0d9488); cursor: pointer; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; padding: 4px 0; }
        .btn-link:hover { text-decoration: underline; }

        /* Section Headers */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section-title { font-size: 18px; font-weight: 600; color: var(--gray-800, #1e293b); display: flex; align-items: center; gap: 8px; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: var(--gray-50, #f8fafc); border-radius: 10px; padding: 16px; border: 1px solid var(--gray-100, #f1f5f9); }
        .stat-label { font-size: 12px; font-weight: 500; color: var(--gray-500, #64748b); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--gray-800, #1e293b); }
        .stat-change { font-size: 13px; display: flex; align-items: center; gap: 4px; margin-top: 4px; }
        .stat-change.up { color: #22c55e; }
        .stat-change.down { color: #ef4444; }
        .stat-meta { font-size: 12px; color: var(--gray-400, #94a3b8); margin-top: 2px; }

        /* Alert Box */
        .alert-box { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; color: #92400e; font-size: 14px; margin-bottom: 16px; }

        /* Recent Payments */
        .payments-title { font-size: 15px; font-weight: 600; color: var(--gray-700, #334155); margin-bottom: 12px; }
        .payment-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--gray-100, #f1f5f9); }
        .payment-row:last-child { border-bottom: none; }
        .payment-name { font-weight: 500; color: var(--gray-800, #1e293b); font-size: 14px; }
        .payment-date { font-size: 12px; color: var(--gray-400, #94a3b8); margin-left: 8px; }
        .payment-amount { font-weight: 600; font-size: 14px; }
        .payment-amount.succeeded { color: #22c55e; }
        .payment-amount.failed { color: #ef4444; }
        .failed-badge { background: #fef2f2; color: #ef4444; font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }

        /* Plan Cards */
        .plan-card { background: white; border: 1px solid var(--gray-200, #e2e8f0); border-radius: 10px; padding: 20px; margin-bottom: 12px; }
        .plan-card.inactive { opacity: 0.6; }
        .plan-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .plan-name { font-size: 16px; font-weight: 600; color: var(--gray-800, #1e293b); }
        .plan-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #dbeafe; color: #1d4ed8; }
        .badge.inactive { background: var(--gray-200, #e2e8f0); color: var(--gray-500, #64748b); }
        .badge.trial { background: #ede9fe; color: #6d28d9; }
        .plan-price { text-align: right; }
        .price-amount { font-size: 22px; font-weight: 700; color: var(--gray-800, #1e293b); }
        .price-interval { font-size: 13px; color: var(--gray-400, #94a3b8); }
        .plan-desc { font-size: 14px; color: var(--gray-500, #64748b); margin-bottom: 10px; }
        .feature-list { list-style: none; padding: 0; margin-bottom: 10px; }
        .feature-item { font-size: 13px; color: var(--gray-600, #475569); display: flex; align-items: center; gap: 6px; padding: 3px 0; }
        .feature-check { color: #22c55e; font-weight: bold; }
        .setup-fee { font-size: 12px; color: var(--gray-400, #94a3b8); margin-bottom: 10px; }
        .plan-actions { display: flex; gap: 8px; border-top: 1px solid var(--gray-100, #f1f5f9); padding-top: 12px; }

        /* Promo Cards */
        .promo-card { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: var(--gray-50, #f8fafc); border-radius: 8px; margin-bottom: 8px; }
        .promo-code { font-weight: 700; font-family: monospace; font-size: 15px; color: var(--gray-800, #1e293b); }
        .promo-discount { color: #22c55e; font-weight: 600; font-size: 14px; margin-left: 12px; }
        .promo-meta { font-size: 12px; color: var(--gray-400, #94a3b8); margin-left: 12px; }

        /* Promo Form */
        .promo-form { background: var(--gray-50, #f8fafc); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 12px; }

        /* Empty Text */
        .empty-text { color: var(--gray-400, #94a3b8); font-size: 14px; text-align: center; padding: 32px 16px; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: white; border-radius: 14px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--gray-100, #f1f5f9); }
        .modal-title { font-size: 18px; font-weight: 600; color: #1e293b; }
        .modal-body { padding: 24px; }

        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-600, #475569); margin-bottom: 6px; }
        .form-input { width: 100%; padding: 10px 12px; border: 1px solid var(--gray-200, #e2e8f0); border-radius: 8px; font-size: 14px; font-family: inherit; background: white; color: var(--gray-800, #1e293b); }
        .form-input:focus { outline: none; border-color: var(--brand-primary, #0d9488); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
        textarea.form-input { resize: vertical; }

        /* Client Link */
        .client-link-section { background: var(--gray-50, #f8fafc); border-radius: 10px; padding: 16px; margin-top: 20px; }
        .client-link-title { font-size: 14px; font-weight: 600; color: var(--gray-700, #334155); margin-bottom: 8px; }
        .client-link-box { display: flex; align-items: center; gap: 8px; }
        .client-link-input { flex: 1; padding: 8px 12px; border: 1px solid var(--gray-200, #e2e8f0); border-radius: 6px; font-size: 13px; font-family: monospace; background: white; color: var(--gray-600, #475569); }
        .copy-btn { padding: 8px 12px; background: var(--gray-100, #f1f5f9); border: 1px solid var(--gray-200, #e2e8f0); border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 4px; }
        .copy-btn:hover { background: var(--gray-200, #e2e8f0); }

        /* Toast */
        .toast { position: fixed; top: 20px; right: 20px; z-index: 10000; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; color: white; transform: translateY(-20px); opacity: 0; transition: all 0.3s; pointer-events: none; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #22c55e; }
        .toast.error { background: #ef4444; }

        @media (max-width: 768px) {
            .page-container { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>

    <script>
        // Sidebar section collapse

        function toggleSidebarSection(label) {
            const section = label.parentElement;
            section.classList.toggle('collapsed');
            const sectionName = section.dataset.section;
            const collapsedSections = JSON.parse(localStorage.getItem('sidebarCollapsed') || '{}');
            collapsedSections[sectionName] = section.classList.contains('collapsed');
            localStorage.setItem('sidebarCollapsed', JSON.stringify(collapsedSections));
        }

        // Restore sidebar collapsed state
        (function restoreSidebarState() {
            const collapsedSections = JSON.parse(localStorage.getItem('sidebarCollapsed') || '{}');
            document.querySelectorAll('.sidebar-nav-section').forEach(section => {
                const sectionName = section.dataset.section;
                if (collapsedSections[sectionName]) {
                    section.classList.add('collapsed');
                }
            });
        })();

        // Mobile sidebar
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.querySelector('.sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('open');
                sidebarOverlay.classList.toggle('active');
            });
        }
        if (sidebarOverlay) {
            sidebarOverlay.addEventListener('click', () => {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('active');
            });
        }

        // Initialize Supabase
        const SUPABASE_URL = 'https://qewqcjzlfqamqwbccapr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFld3FjanpsZnFhbXF3YmNjYXByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM2OTg0NzAsImV4cCI6MjA3OTI3NDQ3MH0.mQnMC33O88oLkLLGWD2oG-oaSHGI-NfHmtQCZxnxSLs';

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentSession = null;
        let currentCoachId = null;
        let connectStatus = null;
        let allPlans = [];
        let allPromoCodes = [];
        let revenueData = null;
        let editingPlanId = null;

        // ── Auth ──
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return false;
            }
            currentSession = session;
            currentCoachId = session.user.id;
            document.getElementById('sidebarEmail').textContent = session.user.email;
            const avatar = document.getElementById('sidebarAvatar');
            if (avatar) avatar.textContent = (session.user.email || 'C')[0].toUpperCase();
            return true;
        }

        async function logout() {
            try { await supabaseClient.auth.signOut({ scope: 'local' }); } catch(e) {}
            localStorage.removeItem('supabase.auth.token');
            sessionStorage.clear();
            window.location.href = 'login.html';
        }

        // ── API Helper ──
        async function apiFetch(url, options = {}) {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) throw new Error('Not authenticated');

            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${session.access_token}`,
                ...options.headers
            };

            const response = await fetch(url, { ...options, headers });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || data.message || `Request failed (${response.status})`);
            }
            return data;
        }

        // ── Toast ──
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        // ── Render Connect Section ──
        function renderConnectSection() {
            const el = document.getElementById('connectSection');
            if (connectStatus?.charges_enabled) {
                el.innerHTML = `
                    <div class="billing-card">
                        <div class="connect-status">
                            <div class="status-dot active"></div>
                            <span style="font-weight:600; color: var(--gray-800, #1e293b);">Stripe Connected &mdash; Payments Active</span>
                        </div>
                        <button class="btn-link" onclick="openStripeDashboard()">
                            <i data-lucide="external-link" style="width:14px;height:14px;"></i> View Stripe Dashboard
                        </button>
                    </div>`;
            } else if (connectStatus?.connected && !connectStatus?.onboarding_complete) {
                el.innerHTML = `
                    <div class="billing-card warning">
                        <div class="connect-status">
                            <div class="status-dot pending"></div>
                            <span style="font-weight:600; color: var(--gray-800, #1e293b);">Stripe setup incomplete &mdash; finish onboarding to receive payments</span>
                        </div>
                        <button class="btn btn-primary" onclick="startOnboarding()">Complete Setup</button>
                    </div>`;
            } else {
                el.innerHTML = `
                    <div class="billing-card">
                        <h3 class="connect-title">Connect Stripe to Accept Payments</h3>
                        <p class="connect-desc">Set up your Stripe account to create payment plans and receive payments from clients directly.</p>
                        <button class="btn btn-primary" onclick="startOnboarding()">
                            <i data-lucide="credit-card" style="width:16px;height:16px;"></i> Connect Stripe
                        </button>
                    </div>`;
            }
            lucide.createIcons();
        }

        // ── Render Revenue Section ──
        function renderRevenueSection() {
            const el = document.getElementById('revenueSection');
            if (!connectStatus?.charges_enabled || !revenueData) {
                el.style.display = 'none';
                return;
            }
            el.style.display = 'block';

            const rev = revenueData.revenue || {};
            const subs = revenueData.subscribers || {};
            const payments = revenueData.recent_payments || [];
            const pastDue = revenueData.past_due_alerts || [];

            const thisMonth = ((rev.this_month_cents || 0) / 100).toFixed(2);
            const lastMonth = ((rev.last_month_cents || 0) / 100).toFixed(2);
            const changeClass = (rev.change_percent || 0) >= 0 ? 'up' : 'down';
            const changeIcon = changeClass === 'up' ? 'trending-up' : 'trending-down';

            let html = `
                <div class="billing-card">
                    <h3 class="section-title"><i data-lucide="trending-up" style="width:18px;height:18px;"></i> Revenue Overview</h3>
                    <div class="stats-grid" style="margin-top: 16px;">
                        <div class="stat-card">
                            <div class="stat-label">This Month</div>
                            <div class="stat-value">$${thisMonth}</div>
                            <div class="stat-change ${changeClass}">
                                <i data-lucide="${changeIcon}" style="width:14px;height:14px;"></i>
                                ${Math.abs(rev.change_percent || 0)}% vs last month
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Last Month</div>
                            <div class="stat-value">$${lastMonth}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Active Subscribers</div>
                            <div class="stat-value">${subs.active || 0}</div>
                            ${subs.trialing > 0 ? `<div class="stat-meta">${subs.trialing} on trial</div>` : ''}
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Total Clients</div>
                            <div class="stat-value">${subs.total || 0}</div>
                            ${subs.canceled > 0 ? `<div class="stat-meta">${subs.canceled} canceled</div>` : ''}
                        </div>
                    </div>`;

            if (pastDue.length > 0) {
                html += `
                    <div class="alert-box">
                        <i data-lucide="alert-triangle" style="width:16px;height:16px;color:#f59e0b;flex-shrink:0;"></i>
                        <span>${pastDue.length} client${pastDue.length > 1 ? 's' : ''} with past-due payments</span>
                    </div>`;
            }

            if (payments.length > 0) {
                html += `<h4 class="payments-title">Recent Payments</h4>`;
                payments.slice(0, 10).forEach(p => {
                    const amount = ((p.amount_cents || 0) / 100).toFixed(2);
                    const statusClass = p.status === 'succeeded' ? 'succeeded' : 'failed';
                    html += `
                        <div class="payment-row">
                            <div>
                                <span class="payment-name">${escapeHtml(p.client_name || 'Unknown')}</span>
                                <span class="payment-date">${new Date(p.created_at).toLocaleDateString()}</span>
                            </div>
                            <div>
                                <span class="payment-amount ${statusClass}">$${amount}</span>
                                ${p.status === 'failed' ? '<span class="failed-badge">Failed</span>' : ''}
                            </div>
                        </div>`;
                });
            }

            html += '</div>';
            el.innerHTML = html;
            lucide.createIcons();
        }

        // ── Render Plans Section ──
        function renderPlansSection() {
            const el = document.getElementById('plansSection');
            if (!connectStatus?.charges_enabled) {
                el.style.display = 'none';
                return;
            }
            el.style.display = 'block';

            const typeLabels = { subscription: 'Subscription', one_time: 'One-Time', tier: 'Tier' };

            let html = `
                <div class="billing-card">
                    <div class="section-header">
                        <h3 class="section-title"><i data-lucide="dollar-sign" style="width:18px;height:18px;"></i> Payment Plans</h3>
                        <button class="btn btn-secondary btn-small" onclick="openPlanModal()">
                            <i data-lucide="plus" style="width:14px;height:14px;"></i> New Plan
                        </button>
                    </div>`;

            if (allPlans.length === 0) {
                html += '<p class="empty-text">No payment plans yet. Create one to start accepting client payments.</p>';
            } else {
                allPlans.forEach(plan => {
                    const price = ((plan.price_cents || 0) / 100).toFixed(2);
                    const interval = plan.billing_interval === 'week' ? '/week' : plan.billing_interval === 'month' ? '/mo' : '';
                    const inactiveClass = plan.is_active ? '' : ' inactive';

                    html += `
                        <div class="plan-card${inactiveClass}">
                            <div class="plan-header">
                                <div>
                                    <div class="plan-name">${escapeHtml(plan.name)}</div>
                                    <div class="plan-meta">
                                        <span class="badge">${typeLabels[plan.type] || plan.type}</span>
                                        ${!plan.is_active ? '<span class="badge inactive">Inactive</span>' : ''}
                                        ${plan.trial_days > 0 ? `<span class="badge trial">${plan.trial_days}d trial</span>` : ''}
                                    </div>
                                </div>
                                <div class="plan-price">
                                    <span class="price-amount">$${price}</span>
                                    <span class="price-interval">${interval}</span>
                                </div>
                            </div>
                            ${plan.description ? `<p class="plan-desc">${escapeHtml(plan.description)}</p>` : ''}
                            ${plan.features && plan.features.length > 0 ? `
                                <ul class="feature-list">
                                    ${plan.features.map(f => `<li class="feature-item"><span class="feature-check">&#10003;</span> ${escapeHtml(f)}</li>`).join('')}
                                </ul>
                            ` : ''}
                            ${plan.setup_fee_cents > 0 ? `<div class="setup-fee">+ $${(plan.setup_fee_cents / 100).toFixed(2)} setup fee</div>` : ''}
                            <div class="plan-actions">
                                <button class="btn btn-secondary btn-small" onclick="openPlanModal('${plan.id}')">
                                    <i data-lucide="edit-3" style="width:14px;height:14px;"></i> Edit
                                </button>
                                <button class="btn btn-small ${plan.is_active ? 'btn-danger' : 'btn-primary'}" onclick="togglePlan('${plan.id}')">
                                    ${plan.is_active
                                        ? '<i data-lucide="eye-off" style="width:14px;height:14px;"></i> Deactivate'
                                        : '<i data-lucide="eye" style="width:14px;height:14px;"></i> Activate'}
                                </button>
                            </div>
                        </div>`;
                });
            }

            html += '</div>';
            el.innerHTML = html;
            lucide.createIcons();
        }

        // ── Render Promo Section ──
        function renderPromoSection() {
            const el = document.getElementById('promoSection');
            if (!connectStatus?.charges_enabled) {
                el.style.display = 'none';
                return;
            }
            el.style.display = 'block';

            const activePromos = allPromoCodes.filter(p => p.is_active);

            let html = `
                <div class="billing-card">
                    <div class="section-header">
                        <h3 class="section-title"><i data-lucide="tag" style="width:18px;height:18px;"></i> Promo Codes</h3>
                        <button class="btn btn-secondary btn-small" id="togglePromoFormBtn" onclick="togglePromoForm()">
                            <i data-lucide="plus" style="width:14px;height:14px;"></i> New Code
                        </button>
                    </div>

                    <div id="promoFormContainer" style="display: none;">
                        <form class="promo-form" onsubmit="handleCreatePromo(event)">
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Code *</label>
                                    <input class="form-input" id="promoCode" required placeholder="SUMMER20" maxlength="20" oninput="this.value=this.value.toUpperCase()">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Type</label>
                                    <select class="form-input" id="promoDiscountType">
                                        <option value="percent">Percentage Off</option>
                                        <option value="fixed">Fixed Amount Off</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Value *</label>
                                    <input class="form-input" id="promoDiscountValue" type="number" min="1" required placeholder="20">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label">Max Uses</label>
                                    <input class="form-input" id="promoMaxUses" type="number" min="1" placeholder="Unlimited">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Expires</label>
                                    <input class="form-input" id="promoExpires" type="date">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary" id="promoSaveBtn">Create Promo Code</button>
                        </form>
                    </div>`;

            if (activePromos.length === 0) {
                html += '<p class="empty-text" id="promoEmptyText">No promo codes yet. Create one to offer discounts to clients.</p>';
            } else {
                activePromos.forEach(promo => {
                    const discount = promo.discount_type === 'percent'
                        ? `${promo.discount_value}% off`
                        : `$${(promo.discount_value / 100).toFixed(2)} off`;
                    const uses = `Used ${promo.times_used || 0}${promo.max_uses ? '/' + promo.max_uses : ''} times`;
                    const expires = promo.expires_at ? ` &middot; Expires ${new Date(promo.expires_at).toLocaleDateString()}` : '';

                    html += `
                        <div class="promo-card">
                            <div>
                                <span class="promo-code">${escapeHtml(promo.code)}</span>
                                <span class="promo-discount">${discount}</span>
                                <span class="promo-meta">${uses}${expires}</span>
                            </div>
                            <button class="btn btn-danger btn-small" onclick="deletePromo('${promo.id}')" title="Deactivate">
                                <i data-lucide="trash-2" style="width:14px;height:14px;"></i>
                            </button>
                        </div>`;
                });
            }

            html += '</div>';
            el.innerHTML = html;
            lucide.createIcons();
        }

        // ── Render Client Link ──
        function renderClientLink() {
            const el = document.getElementById('clientLinkSection');
            if (!connectStatus?.charges_enabled || allPlans.length === 0) {
                el.style.display = 'none';
                return;
            }
            el.style.display = 'block';

            const baseUrl = window.location.origin;
            const link = `${baseUrl}/my-billing?coach=${currentCoachId}`;

            el.innerHTML = `
                <div class="billing-card">
                    <div class="client-link-title">Share Pricing With Clients</div>
                    <p style="font-size:13px; color: var(--gray-500, #64748b); margin-bottom: 12px;">
                        Share this link so clients can view your plans and subscribe.
                    </p>
                    <div class="client-link-box">
                        <input class="client-link-input" value="${escapeHtml(link)}" readonly id="clientLink">
                        <button class="copy-btn" onclick="copyClientLink()">
                            <i data-lucide="copy" style="width:14px;height:14px;"></i> Copy
                        </button>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function copyClientLink() {
            const input = document.getElementById('clientLink');
            input.select();
            navigator.clipboard.writeText(input.value).then(() => {
                showToast('Link copied!');
            }).catch(() => {
                document.execCommand('copy');
                showToast('Link copied!');
            });
        }

        // ── Actions ──
        async function startOnboarding() {
            try {
                const res = await apiFetch('/.netlify/functions/stripe-connect-onboarding', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'create' })
                });
                if (res.url) window.location.href = res.url;
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function openStripeDashboard() {
            try {
                const res = await apiFetch('/.netlify/functions/stripe-connect-onboarding', {
                    method: 'POST',
                    body: JSON.stringify({ action: 'dashboard' })
                });
                if (res.url) window.open(res.url, '_blank');
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // ── Plan Modal ──
        function openPlanModal(planId) {
            editingPlanId = planId || null;
            const plan = planId ? allPlans.find(p => p.id === planId) : null;

            document.getElementById('planModalTitle').textContent = plan ? 'Edit Plan' : 'Create Plan';
            document.getElementById('planSaveBtn').textContent = plan ? 'Update Plan' : 'Create Plan';

            document.getElementById('planName').value = plan?.name || '';
            document.getElementById('planDescription').value = plan?.description || '';
            document.getElementById('planType').value = plan?.type || 'subscription';
            document.getElementById('planPrice').value = plan?.price_cents ? (plan.price_cents / 100).toFixed(2) : '';
            document.getElementById('planInterval').value = plan?.billing_interval || 'month';
            document.getElementById('planTrialDays').value = plan?.trial_days || 0;
            document.getElementById('planSetupFee').value = plan?.setup_fee_cents ? (plan.setup_fee_cents / 100).toFixed(2) : '';
            document.getElementById('planTierLevel').value = plan?.tier_level || 0;
            document.getElementById('planFeatures').value = (plan?.features || []).join('\n');

            togglePlanFields();
            document.getElementById('planModal').style.display = 'flex';
        }

        function closePlanModal() {
            document.getElementById('planModal').style.display = 'none';
            editingPlanId = null;
        }

        function togglePlanFields() {
            const type = document.getElementById('planType').value;
            const isSubscription = type === 'subscription' || type === 'tier';
            document.getElementById('subscriptionFields').style.display = isSubscription ? 'block' : 'none';
            document.getElementById('tierField').style.display = type === 'tier' ? 'block' : 'none';
        }

        async function handleSavePlan(e) {
            e.preventDefault();
            const btn = document.getElementById('planSaveBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const planData = {
                    name: document.getElementById('planName').value,
                    description: document.getElementById('planDescription').value,
                    type: document.getElementById('planType').value,
                    priceCents: Math.round(parseFloat(document.getElementById('planPrice').value || 0) * 100),
                    billingInterval: document.getElementById('planInterval').value,
                    trialDays: parseInt(document.getElementById('planTrialDays').value) || 0,
                    setupFeeCents: Math.round(parseFloat(document.getElementById('planSetupFee').value || 0) * 100),
                    tierLevel: parseInt(document.getElementById('planTierLevel').value) || 0,
                    features: document.getElementById('planFeatures').value.split('\n').map(f => f.trim()).filter(Boolean)
                };

                if (editingPlanId) planData.planId = editingPlanId;

                await apiFetch('/.netlify/functions/coach-billing-plans', {
                    method: 'POST',
                    body: JSON.stringify(planData)
                });

                showToast(editingPlanId ? 'Plan updated!' : 'Plan created!');
                closePlanModal();
                await loadAll();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = editingPlanId ? 'Update Plan' : 'Create Plan';
            }
        }

        async function togglePlan(planId) {
            const plan = allPlans.find(p => p.id === planId);
            if (!plan) return;

            try {
                if (plan.is_active) {
                    await apiFetch(`/.netlify/functions/coach-billing-plans?planId=${planId}`, {
                        method: 'DELETE'
                    });
                    showToast('Plan deactivated');
                } else {
                    await apiFetch('/.netlify/functions/coach-billing-plans', {
                        method: 'POST',
                        body: JSON.stringify({
                            planId: plan.id,
                            name: plan.name,
                            description: plan.description,
                            type: plan.type,
                            priceCents: plan.price_cents,
                            billingInterval: plan.billing_interval,
                            trialDays: plan.trial_days,
                            setupFeeCents: plan.setup_fee_cents,
                            tierLevel: plan.tier_level,
                            features: plan.features,
                            isActive: true
                        })
                    });
                    showToast('Plan activated');
                }
                await loadAll();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // ── Promo Form ──
        function togglePromoForm() {
            const container = document.getElementById('promoFormContainer');
            const btn = document.getElementById('togglePromoFormBtn');
            if (container.style.display === 'none') {
                container.style.display = 'block';
                btn.innerHTML = '<i data-lucide="x" style="width:14px;height:14px;"></i> Cancel';
            } else {
                container.style.display = 'none';
                btn.innerHTML = '<i data-lucide="plus" style="width:14px;height:14px;"></i> New Code';
            }
            lucide.createIcons();
        }

        async function handleCreatePromo(e) {
            e.preventDefault();
            const btn = document.getElementById('promoSaveBtn');
            btn.disabled = true;
            btn.textContent = 'Creating...';

            try {
                const promoData = {
                    code: document.getElementById('promoCode').value,
                    discountType: document.getElementById('promoDiscountType').value,
                    discountValue: parseInt(document.getElementById('promoDiscountValue').value),
                    maxUses: document.getElementById('promoMaxUses').value ? parseInt(document.getElementById('promoMaxUses').value) : null,
                    expiresAt: document.getElementById('promoExpires').value || null,
                    planIds: []
                };

                await apiFetch('/.netlify/functions/coach-promo-codes', {
                    method: 'POST',
                    body: JSON.stringify(promoData)
                });

                showToast('Promo code created!');
                await loadAll();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Promo Code';
            }
        }

        async function deletePromo(promoId) {
            if (!confirm('Deactivate this promo code?')) return;

            try {
                await apiFetch(`/.netlify/functions/coach-promo-codes?promoId=${promoId}`, {
                    method: 'DELETE'
                });
                showToast('Promo code deactivated');
                await loadAll();
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // ── Load All Data ──
        async function loadAll() {
            try {
                const [statusRes, plansRes, promoRes, revenueRes] = await Promise.all([
                    apiFetch('/.netlify/functions/stripe-connect-onboarding', {
                        method: 'POST',
                        body: JSON.stringify({ action: 'status' })
                    }),
                    apiFetch(`/.netlify/functions/coach-billing-plans?coachId=${currentCoachId}`).catch(() => ({ plans: [] })),
                    apiFetch('/.netlify/functions/coach-promo-codes').catch(() => ({ promo_codes: [] })),
                    apiFetch('/.netlify/functions/coach-revenue').catch(() => null)
                ]);

                connectStatus = statusRes;
                allPlans = plansRes.plans || [];
                allPromoCodes = promoRes.promo_codes || [];
                revenueData = revenueRes;
            } catch (err) {
                console.error('Error loading billing data:', err);
            }

            renderConnectSection();
            renderRevenueSection();
            renderPlansSection();
            renderPromoSection();
            renderClientLink();
        }

        // ── Utility ──
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ── Initialize ──
        document.addEventListener('DOMContentLoaded', async () => {
            const isAuthenticated = await checkAuth();
            if (!isAuthenticated) return;

            await loadAll();

            document.getElementById('loadingDiv').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            // Check for connect_complete return from Stripe
            const params = new URLSearchParams(window.location.search);
            if (params.get('connect_complete') === 'true') {
                showToast('Stripe Connect setup updated!');
                // Clean URL
                window.history.replaceState({}, '', window.location.pathname);
            }
        });

        // Close modal on overlay click
        document.getElementById('planModal').addEventListener('click', function(e) {
            if (e.target === this) closePlanModal();
        });
    </script>
</body>
</html>
