<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#2cb5a5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ziquecoach</title>
    <meta name="description" content="Your personalized fitness and nutrition companion">
    <meta property="og:title" content="Ziquecoach">
    <meta property="og:description" content="Your personalized fitness and nutrition companion">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://qewqcjzlfqamqwbccapr.supabase.co/storage/v1/object/public/assets/icons/logo.png">
    <!-- Manifest + home-screen icon resolve PER-GYM on the server (via ?coachId
         or the zq_coach cookie) so iOS shows the gym's name + icon even though
         it reads these tags before our branding JS runs. crossorigin lets iOS
         send the cookie with the manifest fetch. No cookie => Ziquecoach default. -->
    <link rel="manifest" href="/.netlify/functions/dynamic-manifest" crossorigin="use-credentials" id="manifest-link">
    <link rel="icon" type="image/png" href="https://qewqcjzlfqamqwbccapr.supabase.co/storage/v1/object/public/assets/icons/logo.png">
    <link rel="apple-touch-icon" href="/.netlify/functions/coach-icon">
    <!-- Set data-theme BEFORE any CSS loads to prevent white flash.
         global.css uses [data-theme="dark"] to swap CSS variables;
         without this, the light defaults flash for a frame while React boots. -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem('zique-theme') || localStorage.getItem('theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
          document.documentElement.style.backgroundColor = t === 'dark' ? '#0f172a' : '#f8fafc';
          document.documentElement.style.colorScheme = t === 'dark' ? 'dark' : 'light';
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.style.backgroundColor = '#0f172a';
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://qewqcjzlfqamqwbccapr.supabase.co" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Inline splash screen - renders before JS loads to prevent white flash */
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
        }
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }
        .splash-logo {
            width: 100px;
            height: auto;
            animation: splashPulse 2s ease-in-out infinite;
        }
        @keyframes splashPulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .splash-spinner {
            width: 40px;
            height: 40px;
            /* Neutral gray by default — the inline branding script below paints
               it in the coach's color when a cached brand exists. Never show a
               wrong brand color on a first visit. */
            border: 3px solid rgba(148, 163, 184, 0.25);
            border-top-color: #94a3b8;
            border-radius: 50%;
            animation: splashSpin 1s linear infinite;
        }
        @keyframes splashSpin {
            to { transform: rotate(360deg); }
        }
    </style>
    <link rel="stylesheet" href="css/emoji-font.css">
</head>
<body>
    <div id="root">
        <!-- Inline splash screen - replaced automatically when React mounts -->
        <div class="splash-screen" id="splash-screen">
            <div class="splash-content">
                <!-- Hidden until the inline branding script knows which logo to
                     show. On a device that has loaded the app before, the cached
                     coach logo appears on the very first frame; on a brand-new
                     device the splash stays neutral (spinner only) instead of
                     flashing the platform logo at a coach's client. -->
                <img
                    src="https://qewqcjzlfqamqwbccapr.supabase.co/storage/v1/object/public/assets/ziquecoach-logo-teal.png"
                    alt=""
                    class="splash-logo"
                    id="splash-logo"
                    style="display: none"
                />
                <div class="splash-spinner" id="splash-spinner"></div>
            </div>
        </div>
    </div>
    <script>
        // Soft-reset splash handoff: if Play Mode just triggered a full-page
        // reload between exercises, the modal stashed the "Exercise complete /
        // Up next / Load Next Exercise" card payload in localStorage. Render
        // the SAME card here so the user sees one continuous splash across
        // the reload.
        //
        // CRITICAL: render the card into a NEW element appended to <body>
        // (outside #root), not into #splash-screen. React mounts into #root
        // and replaces its contents — if the card lived in there, the user
        // would see card → React's LoadingScreen (logo+spinner) → momentary
        // /login redirect → Workouts page → modal opens. By living outside
        // #root with a higher z-index, the card stays visible through every
        // one of those frames, and GuidedWorkoutModal removes it on mount
        // so the hand-off into the next exercise is seamless.
        (function() {
            try {
                var raw = localStorage.getItem('zique_soft_reset_splash');
                if (!raw) return;
                var data = JSON.parse(raw);
                if (!data || !data.ts) return;
                // Stale entries (>30s old) are ignored — same TTL as the
                // other soft-reset handoff flags.
                if (Date.now() - data.ts > 30000) {
                    try { localStorage.removeItem('zique_soft_reset_splash'); } catch (e) {}
                    return;
                }
                var esc = function(s) {
                    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
                        return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
                    });
                };
                var isDark = data.theme !== 'light';
                var bg = isDark ? '#0f172a' : '#f8fafc';
                var cardBg = isDark ? '#1e293b' : '#ffffff';
                var border = isDark ? '#334155' : '#e2e8f0';
                var textPrimary = isDark ? '#f8fafc' : '#0f172a';
                var textMuted = isDark ? '#cbd5e1' : '#64748b';
                var brandColor = data.brandColor || '#2cb5a5';
                var shadow = isDark ? '0 10px 30px rgba(0,0,0,0.4)' : '0 10px 30px rgba(15, 23, 42, 0.1)';
                var overlay = document.createElement('div');
                overlay.id = 'soft-reset-splash-overlay';
                overlay.style.cssText =
                    'position:fixed;inset:0;z-index:10001;background:' + bg + ';' +
                    'display:flex;flex-direction:column;align-items:center;justify-content:center;' +
                    'padding:20px;user-select:none;-webkit-user-select:none';
                var logoHtml = data.brandLogo
                    ? '<img src="' + esc(data.brandLogo) + '" alt="' + esc(data.brandName) + '" style="max-width:80px;max-height:56px;object-fit:contain;margin-bottom:16px;opacity:0.9" />'
                    : '';
                var nextHtml = data.nextName
                    ? '<div style="font-size:13px;color:' + textMuted + ';margin-bottom:4px">Up next</div>'
                      + '<div style="font-size:16px;font-weight:600;color:' + textPrimary + ';margin-bottom:18px;word-break:break-word">' + esc(data.nextName) + '</div>'
                    : '';
                overlay.innerHTML =
                    '<div style="width:100%;max-width:360px;background:' + cardBg + ';border:1px solid ' + border + ';border-radius:16px;padding:28px 24px;box-shadow:' + shadow + ';text-align:center">' +
                      logoHtml +
                      '<div style="font-size:14px;font-weight:600;color:' + brandColor + ';margin-bottom:6px">&#10003; Exercise complete</div>' +
                      '<div style="font-size:18px;font-weight:700;color:' + textPrimary + ';margin-bottom:14px;word-break:break-word">' + esc(data.completedName || 'Exercise') + '</div>' +
                      nextHtml +
                      '<button id="soft-reset-splash-btn" type="button" style="width:100%;margin-top:6px;padding:14px;background:' + brandColor + ';color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer">Load Next Exercise</button>' +
                    '</div>';
                // Fade the bridge card out and remove it. Shared by the tap
                // handler and the 12s safety timeout so they can't double-run.
                var fading = false;
                var fadeOutOverlay = function() {
                    if (fading) return;
                    fading = true;
                    var el = document.getElementById('soft-reset-splash-overlay');
                    if (!el) return;
                    el.style.transition = 'opacity 250ms ease';
                    el.style.opacity = '0';
                    setTimeout(function() {
                        var el2 = document.getElementById('soft-reset-splash-overlay');
                        if (el2 && el2.parentNode) el2.parentNode.removeChild(el2);
                    }, 300);
                };
                // Make the button actually respond to a tap. Normally the
                // GuidedWorkoutModal removes this overlay the instant it
                // remounts after the reload (~1-2s), so the user never needs
                // to touch it. But if they DO tap "Load Next Exercise" while
                // React is still booting (or if the modal never comes back —
                // e.g. the post-reload workout match fails), an unwired
                // button looks broken. On tap: show "Loading..." feedback,
                // then fade the bridge so the reloaded workout screen
                // underneath shows through. Whichever happens first — this
                // tap or the modal's own mount-time removal — the user is no
                // longer staring at a dead card.
                overlay.addEventListener('click', function() {
                    var btn = document.getElementById('soft-reset-splash-btn');
                    if (btn) {
                        btn.textContent = 'Loading...';
                        btn.style.opacity = '0.7';
                    }
                    // Give a freshly-mounted modal a beat to take over (it
                    // removes this overlay itself); otherwise reveal the app.
                    setTimeout(fadeOutOverlay, 400);
                });
                if (document.body) {
                    document.body.appendChild(overlay);
                } else {
                    document.addEventListener('DOMContentLoaded', function() {
                        document.body.appendChild(overlay);
                    });
                }
                // Safety: if something goes wrong and the modal never mounts
                // to remove the overlay, fade it out after 12s so the user
                // isn't stuck staring at the card forever.
                setTimeout(fadeOutOverlay, 12000);
                // One-shot: clear so a future un-related reload doesn't pick
                // it up. The overlay element is the only thing that needs
                // to live on from here.
                try { localStorage.removeItem('zique_soft_reset_splash'); } catch (e) {}
            } catch (e) { /* silent fail — fall back to the default spinner splash */ }
        })();
    </script>
    <script>
        // Apply cached coach branding instantly, BEFORE React boots, so the very
        // first frame is already in the coach's brand colors — no default-teal
        // flash on cold start. Two sources, in order of completeness:
        //   1. zique_branding_preload (localStorage) — survives full app close,
        //      and carries the exact computed brand CSS variables to replay onto
        //      :root so the whole app (buttons, banners, rings, tiles) is branded
        //      on first paint, not just the splash spinner.
        //   2. zique_branding (sessionStorage) — legacy, current-tab only.
        // No network calls here; React's BrandingContext still fetches fresh
        // branding and corrects anything stale a moment later.
        (function() {
            try {
                var root = document.documentElement;

                // 1. Replay the full brand CSS-variable snapshot onto :root.
                var preloadRaw = localStorage.getItem('zique_branding_preload');
                var preload = preloadRaw ? JSON.parse(preloadRaw) : null;
                if (preload && preload.cssVars) {
                    for (var name in preload.cssVars) {
                        if (Object.prototype.hasOwnProperty.call(preload.cssVars, name)) {
                            root.style.setProperty(name, preload.cssVars[name]);
                        }
                    }
                }

                // 2. Resolve splash assets (prefer the persistent preload, fall
                //    back to the per-tab sessionStorage cache).
                var logoUrl = preload && preload.logo;
                var faviconUrl = preload && preload.favicon;
                var primary = preload && preload.primary;
                var coachId = preload && preload.coachId;
                var brandName = preload && preload.brandName;
                if (!logoUrl || !primary || !faviconUrl) {
                    var cached = sessionStorage.getItem('zique_branding');
                    var b = cached ? (JSON.parse(cached).branding || null) : null;
                    if (b) {
                        logoUrl = logoUrl || b.brand_logo_url;
                        faviconUrl = faviconUrl || b.brand_favicon_url;
                        primary = primary || b.brand_primary_color;
                        coachId = coachId || b.coach_id;
                        brandName = brandName || b.brand_name;
                    }
                }

                // Apply the cached brand logo to the splash and reveal it.
                // (The img starts hidden so a first-ever visit shows a neutral
                // splash rather than the wrong brand.)
                if (logoUrl) {
                    var logo = document.getElementById('splash-logo');
                    if (logo) {
                        logo.src = logoUrl;
                        logo.style.display = '';
                    }
                }
                // Apply custom primary color to the splash spinner
                if (primary) {
                    var spinner = document.getElementById('splash-spinner');
                    if (spinner) {
                        spinner.style.borderColor = primary + '33';
                        spinner.style.borderTopColor = primary;
                    }
                    // Keep the browser/PWA status bar in brand color too
                    var themeMeta = document.querySelector('meta[name="theme-color"]');
                    if (themeMeta) themeMeta.content = primary;
                }
                // Update manifest link + title + icon for branded PWA homescreen saves
                if (coachId) {
                    // Persist the gym id in a cookie so the server-rendered
                    // manifest + apple-touch-icon (which iOS/Android read before
                    // this JS runs, on the next launch) resolve to this gym.
                    try {
                        document.cookie = 'zq_coach=' + encodeURIComponent(coachId) + '; path=/; max-age=31536000; SameSite=Lax';
                    } catch (e) { /* cookies disabled — dynamic links below still help */ }

                    var manifestLink = document.getElementById('manifest-link');
                    if (manifestLink) {
                        manifestLink.href = '/.netlify/functions/dynamic-manifest?coachId=' + coachId;
                    }
                    if (brandName) document.title = brandName;
                    // Home-screen icon: prefer the square favicon (looks right as
                    // an app icon); only fall back to the wide logo if no favicon
                    // is set. Using the wide/transparent logo here makes the phone
                    // icon look blank.
                    var homeIcon = faviconUrl || logoUrl;
                    if (homeIcon) {
                        var touchIcon = document.querySelector('link[rel="apple-touch-icon"]');
                        if (touchIcon) touchIcon.href = homeIcon;
                    }
                }
            } catch (e) { /* silent fail — fall back to default branding */ }
        })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script src="/js/twemoji-init.js"></script>
</body>
</html>
